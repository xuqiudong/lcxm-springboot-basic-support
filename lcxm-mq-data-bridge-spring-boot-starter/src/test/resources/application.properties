server.port=10091
spring.application.name=test mq data bridge starter
# log 4 mybatis
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# MySQL configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/basic_support?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2b8&useSSL=true&rewriteBatchedStatements=true
spring.datasource.username=basic_support
spring.datasource.password=12345678

spring.redis.host=127.0.0.1
spring.redis.password=123456!@#$%^
spring.redis.database=1
spring.redis.port=6379
spring.redis.timeout=5000
# By default, Spring Boot 2 recommends using the Lettuce connection pool.
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-idle=20
spring.redis.lettuce.pool.min-idle=10
spring.redis.lettuce.pool.max-wait=-1

# RabbitMQ connection information
spring.rabbitmq.host=192.168.80.180
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=12345678

# Virtual host. It can be left unset if using the default one.
# spring.rabbitmq.virtual-host=/

# Connection factory settings
# Connection timeout in milliseconds.
spring.rabbitmq.connection-timeout=15000
# Number of cached channels.
spring.rabbitmq.cache.channel.size=25
# Minimum number of consumers.
spring.rabbitmq.listener.simple.concurrency=5
# Maximum number of consumers.
spring.rabbitmq.listener.simple.max-concurrency=10

# Confirmation config
spring.rabbitmq.publisher-confirm-type=correlated
# Enable message return.
spring.rabbitmq.publisher-returns=true

## data bridge configuration
data.bridge.mq-enabled=true
data.bridge.receive-enabled=true
data.bridge.send-enabled=true
data.bridge.consume-enabled=true
data.bridge.exchange=data_bridge_exchange
data.bridge.send-queue=vic_local_test_queue
#data.bridge.send-routing-key=data_bridge_send_routing_key
data.bridge.send-routing-key=local_routing_key
data.bridge.send-confirm-timeout=5000
#data.bridge.receive-queue=data_bridge_receive_queue
data.bridge.receive-queue=vic_local_test_queue
#data.bridge.receive-routing-key=data_bridge_receive_routing_key
data.bridge.receive-routing-key=local_routing_key
# consume flag: just consumer the message witch has this flag
data.bridge.consume-flag=vic
# send flag: send  message with this flag
data.bridge.send-flag=vic
# produce flag: produce message with this flag
data.bridge.produce-flag=vic