# ***************************************************************
# DataSource Config
# @see DataSourceAutoConfiguration
# @see DataSourceProperties
# ***************************************************************
database.server=192.168.210.22:3306
database.schema=db_framework
spring.datasource.username=root
spring.datasource.password=Mysql@2025
# shared datasource config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${database.server}/${database.schema}?allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=5000
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.maximumPoolSize=50
spring.datasource.hikari.connectionTestQuery=select 1
# \u8D85\u8FC7300\u79D2\u63D0\u793A\u6B7B\u9501
spring.datasource.hikari.leakDetectionThreshold=300000
spring.datasource.hikari.autoCommit=false

# ***************************************************************
# Liquibase for Database Version Control
# @see LiquibaseAutoConfiguration
# @see LiquibaseProperties
# ***************************************************************
spring.liquibase.change-log=classpath:liquibase/master.xml
# default is true
spring.liquibase.enabled=true

# ***************************************************************
# MyBatisPlus\u914D\u7F6E
# @see MybatisPlusAutoConfiguration
# @see MybatisPlusProperties
# ***************************************************************
# \u9ED8\u8BA4\u4E0D\u4FDD\u5B58null\u5B57\u6BB5\uFF0C\u907F\u514D\u6570\u636E\u4E22\u5931
mybatis-plus.global-config.db-config.update-strategy=NOT_NULL
mybatis-plus.global-config.db-config.insert-strategy=NOT_NULL
# \u5F00\u542F\u9A7C\u5CF0\u547D\u540D\u89C4\u8303
mybatis-plus.configuration.mapUnderscoreToCamelCase=true
# \u4E0D\u4F7F\u7528\u6570\u636E\u5E93\u81EA\u589Eid
mybatis-plus.configuration.useGeneratedKeys=false
# \u542F\u7528\u5220\u9664\u524D\u5907\u4EFD\u63D2\u4EF6
mybatis-plus.trash-plugin.table=sys_trash
# \u7ED9sql\u65E5\u5FD7\u52A0\u65AD\u8A00
mybatis-plus.configuration.logImpl=com.kjlink.cloud.mybatis.SqlLog

# ***************************************************************
# Logging \u65E5\u5FD7\u914D\u7F6E
# ***************************************************************
spring.output.ansi.enabled=always
logging.level.root=info
logging.level.com.kjlink=debug

