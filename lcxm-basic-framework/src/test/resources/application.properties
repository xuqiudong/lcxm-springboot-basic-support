# Redis\u6838\u5FC3\u914D\u7F6E
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=123456!@#$%^
spring.data.redis.database=7
spring.data.redis.timeout=10000

# Lettuce\u8FDE\u63A5\u6C60\u914D\u7F6E
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# \u590D\u7528\u5185\u7F6E\u7684\u989C\u8272\u53D8\u91CF\uFF0C\u4EC5\u6DFB\u52A0%L\uFF08\u884C\u53F7\uFF09\uFF0C\u53BB\u6389%method\uFF08\u907F\u514D\u5F71\u54CD\u8DF3\u8F6C\uFF09
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}:%L){cyan} %clr(:){faint} %m%n
# \u5F3A\u5236\u5F00\u542FANSI\u989C\u8272
spring.output.ansi.enabled=ALWAYS
