# ***************************************************************
# \u9ED8\u8BA4\u751F\u4EA7\u7EA7\u914D\u7F6E\uFF0C\u4F18\u5148\u7EA7\u5F88\u4F4E
# \u8BF7\u6309\u9700\u914D\u7F6E\u8981\u8986\u76D6\u7684\u914D\u7F6E\u5230\u9879\u76EE\u4E2D
# ***************************************************************
spring.application.name=lcxm-basic
server.port=8000


# ***************************************************************
# Logging \u65E5\u5FD7\u914D\u7F6E
# ***************************************************************
spring.output.ansi.enabled=always
logging.level.root=info
logging.level.cn.xuqiudong=debug
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.logback.rollingpolicy.clean-history-on-start=false
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.total-size-cap=10GB
logging.logback.rollingpolicy.max-history=180


# ***************************************************************
# Spring\u7F13\u5B58\u914D\u7F6E\u4F7F\u7528Redis
# use @Cacheable on FeignClient to reduce network requests
# @see CacheAutoConfiguration
# @see CacheProperties
# ***************************************************************
spring.cache.type=REDIS
spring.cache.redis.time-to-live=600S
spring.cache.redis.key-prefix=lcxm:cache:


# ***************************************************************
# DataSource Config
# @see DataSourceAutoConfiguration
# @see DataSourceProperties
# ***************************************************************
database.server=mysql:3306
database.schema=db_framework
spring.datasource.username=user
spring.datasource.password=Mysql@2025
# shared datasource config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${database.server}/${database.schema}?allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=300000
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.maximumPoolSize=50
spring.datasource.hikari.connectionTestQuery=select 1
# \u8D85\u8FC7300\u79D2\u63D0\u793A\u6B7B\u9501
spring.datasource.hikari.leakDetectionThreshold=300000
spring.datasource.hikari.autoCommit=false


# ***************************************************************
# Liquibase for Database Version Control
# @see LiquibaseAutoConfiguration
# @see LiquibaseProperties
# ***************************************************************
spring.liquibase.change-log=classpath:liquibase/master.xml
#\u4EE5\u4E0B\u540C\u9ED8\u8BA4\u503C
#spring.liquibase.enabled=true


# ***************************************************************
# MyBatisPlus\u914D\u7F6E
# @see MybatisPlusAutoConfiguration
# @see MybatisPlusProperties
# ***************************************************************
# \u9ED8\u8BA4\u4E0D\u4FDD\u5B58null\u5B57\u6BB5\uFF0C\u907F\u514D\u6570\u636E\u4E22\u5931
mybatis-plus.global-config.db-config.update-strategy=NOT_NULL
mybatis-plus.global-config.db-config.insert-strategy=NOT_NULL
# \u5F00\u542F\u9A7C\u5CF0\u547D\u540D\u89C4\u8303
mybatis-plus.configuration.mapUnderscoreToCamelCase=true
# \u4E0D\u4F7F\u7528\u6570\u636E\u5E93\u81EA\u589Eid
mybatis-plus.configuration.useGeneratedKeys=false
# \u542F\u7528\u5220\u9664\u524D\u5907\u4EFD\u63D2\u4EF6
mybatis-plus.trash-plugin.enabled=true


# ***************************************************************
# Redis Configuration
# @see RedisProperties
# ***************************************************************
spring.data.redis.host=localhost
spring.data.redis.password=123456!@#$%^
spring.data.redis.connect-timeout=5s
spring.data.redis.timeout=15s
spring.data.redis.lettuce.read-from=masterPreferred
#\u4EE5\u4E0B\u914D\u7F6E\u540C\u9ED8\u8BA4\u503C
#spring.data.redis.port=6379
#spring.data.redis.database=0


# ***************************************************************
# 10. Web properties
# @see WebMvcAutoConfiguration
# @see ServletWebServerFactoryAutoConfiguration
# @see HttpEncodingAutoConfiguration
# @see WebMvcProperties
# @see HttpProperties
# @see ServerProperties
# ***************************************************************
# enable debug message
server.error.includeMessage=always
server.error.includeStacktrace=never
# support forward header for swagger
server.forward-headers-strategy=framework
# 120 \u5206\u949F\u8D85\u65F6
server.servlet.session.timeout=120m

# default locale
spring.web.locale=zh
# pdf\u5728\u7EBF\u67E5\u770B
spring.mvc.contentnegotiation.media-types.pdf=application/pdf
# svg\u5728\u7EBF\u67E5\u770B
spring.mvc.contentnegotiation.media-types.svg=image/svg+xml
server.servlet.encoding.charset=UTF-8
# limit upload file size
spring.servlet.multipart.max-file-size=4096MB
spring.servlet.multipart.max-request-size=4096MB

# ******************************************
#  @see WebProperties$Resources
# ******************************************
# \u5F00\u542F\u9759\u6001\u8D44\u6E90\u7F13\u5B58
spring.web.resources.chain.cache=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.web.resources.cache.period=P1D

# tomcat\u6700\u5C0F\u7EBF\u7A0B\u6570\uFF0C\u9ED8\u8BA410\u4E2A
server.tomcat.threads.min-spare=10

# graceful shutdown for release db connection pool
server.shutdown=GRACEFUL

# ***************************************************************
# Message Source
# @see MessageSourceAutoConfiguration
# @see MessageSourceProperties
# ***************************************************************
# \u540C\u9ED8\u8BA4\u914D\u7F6E
#spring.messages.basename=messages
#spring.messages.encoding=UTF-8
# true:use jvm language; false:use spring.mvc.locale
spring.messages.fallbackToSystemLocale=false


# ***************************************************************
# Nacos config won't take effect here, copy to project or docker yaml
# ***************************************************************
spring.config.import=optional:nacos:${spring.application.name}.properties,optional:nacos:public.properties
spring.cloud.nacos.config.enabled=false
spring.cloud.nacos.config.server-addr=nacos:8848
spring.cloud.nacos.config.username=nacos
spring.cloud.nacos.config.password=Nacos@2025


# ***************************************************************
# Nacos Service Discovery
# @see  NacosDiscoveryAutoConfiguration
# @see  NacosDiscoveryProperties
# ***************************************************************
# default it true, disable this when run junit
spring.cloud.nacos.discovery.enabled=false
# default is true, we don't need register while write code
spring.cloud.nacos.discovery.registerEnabled=false
spring.cloud.nacos.discovery.server-addr=${spring.cloud.nacos.config.server-addr}
spring.cloud.nacos.discovery.username=${spring.cloud.nacos.config.username}
spring.cloud.nacos.discovery.password=${spring.cloud.nacos.config.password}


# ***************************************************************
# OpenFeign
# @see FeignAutoConfiguration
# @see FeignClientProperties
# @see FeignClientConfiguration
# ***************************************************************
# 10 seconds
spring.cloud.openfeign.client.config.default.connect-timeout=10000
# 5 minutes
spring.cloud.openfeign.client.config.default.read-timeout=300000
# feign.Logger.Level
spring.cloud.openfeign.client.config.default.logger-level=HEADERS
# \u5EF6\u8FDF\u89E3\u6790Feign
spring.cloud.openfeign.lazy-attributes-resolution=true

# ***************************************************************
# SpringDoc
# @see SpringDocConfigProperties
# ***************************************************************
# default is true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=cn.xuqiudong
# \u8BF7\u6C42\u4F53\u63A8\u8350\u4F7F\u7528json
springdoc.default-consumes-media-type=application/json
springdoc.default-support-form-data=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true


# ******************************************
#   Spring TaskExecutor
#   @see TaskExecutionAutoConfiguration
#   @see TaskExecutionProperties
# ******************************************
spring.task.execution.pool.coreSize=2
spring.task.execution.pool.maxSize=4
spring.task.execution.pool.queueCapacity=1000
spring.task.execution.pool.keepAlive=300S


# ***************************************************************
# spring cloud actuator
# ***************************************************************
management.endpoints.web.exposure.include=*
management.info.env.enabled=true


# ***************************************************************
# Spring Security
# @see SecurityProperties
# ***************************************************************
## \u56FA\u5B9A\u6D4B\u8BD5\u8D26\u53F7user\uFF0C\u5BC6\u7801user12345678
# \u7528\u4E8Eswagger\u6D4B\u8BD5\uFF0Cspring-boot-admin\u76D1\u63A7\u529F\u80FD
spring.security.user.password={bcrypt}$2a$10$sqtnoMSKC9qJgxvuQwuDbeAb5rC.ZDz5Y..Ub9uWO6fITQIM5PvBu


# ***************************************************************
# JWT\u914D\u7F6E
# \u5FAE\u670D\u52A1\u4F7F\u7528JWT\u4EE4\u724C\u8FDB\u884C\u8BA4\u8BC1\uFF0C\u4E0D\u9700\u8981Session
# @see LcxmSecurityProperties
# ***************************************************************
# jwt\u7B7E\u540D\u5BC6\u94A5\uFF0C\u5404\u5FAE\u670D\u52A1\u9700\u8981\u4FDD\u6301\u76F8\u540C
lcxm.security.jwt-secret=e5HnhwKaS6mZ9+jYL1kJNzTCd9JagQ5MpIyASy3JdlM
