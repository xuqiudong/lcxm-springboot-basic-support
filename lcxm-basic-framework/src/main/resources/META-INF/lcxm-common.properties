lcxm.security.global-permit-patterns=/favicon.ico,/swagger-ui.html,/swagger-ui/**,\
  /v3/api-docs,/v3/api-docs/*,/actuator/health/ping,/error,\
  /**/*.js,/**/*.css,/**/*.map,/**/*.html,\
  /**/*.woff,/**/*.woff2,/**/*.ttf,/**/*.svg,\
