# ***************************************************************
# env postProcessor for lcxm
# @see ExternalConfigProcessor
# @see DecryptEnvironmentPostProcessor
# ***************************************************************
# decrypt  environment
lcxm.env.decrypt.enable=true
lcxm.env.decrypt.prefix=dec()
lcxm.env.decrypt.salt=vic-xu
# external config
lcxm.env.external.enable=false
lcxm.env.external.location=

